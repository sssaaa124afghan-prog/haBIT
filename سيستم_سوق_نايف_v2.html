<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام نور الخليج - سوق نايف</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<style>
:root{
--p:#0a0f1a;--p2:#111827;--p3:#1f2937;--a:#3b82f6;--a2:#2563eb;--a3:#1d4ed8;
--g:#10b981;--g2:#059669;--r:#ef4444;--r2:#dc2626;--o:#f59e0b;--o2:#d97706;
--pu:#8b5cf6;--pk:#ec4899;--tl:#14b8a6;--cy:#06b6d4;
--bg:#f0f4f8;--c:#ffffff;--c2:#f8fafc;--b:#e2e8f0;--b2:#cbd5e1;
--t:#0f172a;--t2:#475569;--t3:#94a3b8;
--gold:#c8956c;--gold2:#b07d56;--gold3:#fef3c7;
--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
--sh2:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
--sh3:0 10px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.05);
--sh-glow:0 0 20px rgba(59,130,246,.15);
--r:8px;--r2:12px;--r3:16px;--r4:20px;
--transition:.2s cubic-bezier(.4,0,.2,1)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t);direction:rtl;font-size:13px;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::selection{background:rgba(59,130,246,.15);color:var(--a3)}

/* === LAYOUT === */
.layout{display:flex;min-height:100vh}
.sidebar{width:250px;background:linear-gradient(180deg,var(--p) 0%,var(--p2) 40%,var(--p3) 100%);color:#fff;position:fixed;top:0;right:0;bottom:0;z-index:100;display:flex;flex-direction:column;transition:transform .3s var(--transition);overflow:hidden;border-left:1px solid rgba(255,255,255,.04)}
.sidebar-header{padding:24px 20px 20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.1)}
.sidebar-header .logo-icon{font-size:32px;display:block;margin-bottom:6px;filter:drop-shadow(0 2px 4px rgba(200,149,108,.3))}
.sidebar-header .logo-text{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--gold),#e8c9a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.sidebar-header .logo-sub{font-size:9px;color:rgba(255,255,255,.3);margin-top:4px;letter-spacing:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-group{padding:14px 20px 6px;font-size:9px;font-weight:700;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:2px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 10px;border-radius:var(--r);color:rgba(255,255,255,.5);cursor:pointer;transition:all var(--transition);font-size:12.5px;border:none;background:none;width:calc(100% - 20px);text-align:right;font-family:inherit;position:relative}
.nav-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8);transform:translateX(-2px)}
.nav-btn.active{background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(139,92,246,.1));color:var(--gold);font-weight:700;border-right:3px solid var(--gold)}
.nav-btn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--gold);border-radius:0 2px 2px 0}
.nav-btn .icon{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.nav-btn .label{flex:1}
.nav-btn .count{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--p);font-size:8px;font-weight:800;padding:2px 7px;border-radius:8px;min-width:18px;text-align:center;box-shadow:0 2px 4px rgba(200,149,108,.3)}
.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;background:rgba(0,0,0,.15)}
.sync-badge{display:flex;align-items:center;gap:6px;font-size:10px;color:rgba(255,255,255,.35);padding:6px 10px;border-radius:var(--r);background:rgba(255,255,255,.03)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--g);flex-shrink:0;box-shadow:0 0 6px rgba(16,185,129,.4)}

.main{margin-right:250px;padding:24px;min-height:100vh}

/* === COMPONENTS === */
.page{display:none;animation:pageIn .3s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.topbar h2{font-size:18px;font-weight:800;color:var(--p);display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.topbar-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.card{background:var(--c);border-radius:var(--r3);padding:22px;box-shadow:var(--sh);border:1px solid var(--b);margin-bottom:16px;transition:all var(--transition)}
.card:hover{box-shadow:var(--sh2)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:700;color:var(--p);display:flex;align-items:center;gap:8px}

.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:22px}
.stat{background:var(--c);border-radius:var(--r3);padding:18px;box-shadow:var(--sh);border:1px solid var(--b);border-right:4px solid var(--a);transition:all var(--transition);position:relative;overflow:hidden}
.stat:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,transparent 60%,rgba(59,130,246,.03));pointer-events:none}
.stat-icon{font-size:26px;margin-bottom:8px}
.stat-val{font-size:24px;font-weight:800;color:var(--p);letter-spacing:-.5px}
.stat-label{font-size:10px;color:var(--t3);margin-top:3px;font-weight:500}

/* Forms */
.form-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column}
.form-group.span-2{grid-column:span 2}
.form-group.span-all{grid-column:1/-1}
.form-group label{font-size:10px;font-weight:600;color:var(--t2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.form-group label .req{color:var(--r);font-weight:800}
.input{width:100%;padding:9px 12px;border:1.5px solid var(--b);border-radius:var(--r);font-size:12px;font-family:inherit;background:var(--c2);color:var(--t);transition:all var(--transition);outline:none}
.input:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(59,130,246,.08);background:var(--c)}
.input::placeholder{color:var(--b2)}
select.input{cursor:pointer}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;transition:all var(--transition);border:1.5px solid transparent;font-family:inherit;white-space:nowrap;line-height:1.4;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);pointer-events:none}
.btn:hover{transform:translateY(-1px);box-shadow:var(--sh2)}
.btn:active{transform:translateY(0);box-shadow:none}
.btn-primary{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff}.btn-primary:hover{background:linear-gradient(135deg,var(--a2),var(--a3))}
.btn-success{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff}
.btn-danger{background:linear-gradient(135deg,var(--r),var(--r2));color:#fff}
.btn-warning{background:linear-gradient(135deg,var(--o),var(--o2));color:#fff}
.btn-ghost{background:var(--c);color:var(--t2);border-color:var(--b)}.btn-ghost:hover{background:var(--c2);border-color:var(--b2)}
.btn-sm{padding:5px 10px;font-size:10px}
.btn-lg{padding:11px 26px;font-size:13px}
.btn-icon{width:34px;height:34px;padding:0}
.btn-link{background:none;border:none;color:var(--a);padding:4px 8px;text-decoration:underline;font-size:11px}.btn-link:hover{color:var(--a3);transform:none;box-shadow:none}

/* Tables */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r)}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
thead th{background:var(--c2);padding:11px 12px;text-align:right;font-weight:700;color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--b);position:sticky;top:0;white-space:nowrap;z-index:1}
tbody td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle;transition:background var(--transition)}
tbody tr:hover td{background:rgba(59,130,246,.02)}
tbody tr:last-child td{border-bottom:none}

.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:8px;font-size:9px;font-weight:700;letter-spacing:.3px}
.bg-green{background:#dcfce7;color:#166534}.bg-red{background:#fee2e2;color:#991b1b}
.bg-blue{background:#dbeafe;color:#1e40af}.bg-yellow{background:#fef9c3;color:#854d0e}
.bg-purple{background:#f3e8ff;color:#6b21a8}.bg-gray{background:#f1f5f9;color:#475569}
.bg-orange{background:#ffedd5;color:#9a3412}.bg-teal{background:#ccfbf1;color:#115e59}
.bg-pink{background:#fce7f3;color:#9d174d}.bg-cyan{background:#cffafe;color:#155e75}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);padding:20px}
.modal-backdrop.open{display:flex}
.modal-box{background:var(--c);border-radius:var(--r4);max-width:650px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--sh3),0 0 40px rgba(0,0,0,.1);animation:modalPop .25s cubic-bezier(.34,1.56,.64,1)}
.modal-box.lg{max-width:880px}
@keyframes modalPop{from{opacity:0;transform:scale(.92) translateY(15px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:22px 24px 0;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:800;color:var(--p);display:flex;align-items:center;gap:8px}
.modal-close{background:var(--c2);border:1px solid var(--b);width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t3);cursor:pointer;border-radius:var(--r);transition:all var(--transition)}
.modal-close:hover{background:var(--r);color:#fff;border-color:var(--r)}
.modal-body{padding:22px 24px}
.modal-footer{padding:0 24px 22px;display:flex;gap:8px;justify-content:flex-end}

/* Toast */
.toast-area{position:fixed;bottom:20px;left:20px;z-index:9999;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none}
.toast-msg{padding:12px 20px;border-radius:var(--r2);color:#fff;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;box-shadow:var(--sh3);transform:translateX(-120%);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:auto;max-width:380px;backdrop-filter:blur(10px)}
.toast-msg.show{transform:translateX(0);opacity:1}
.toast-s{background:linear-gradient(135deg,var(--g),var(--g2))}.toast-e{background:linear-gradient(135deg,var(--r),var(--r2))}
.toast-i{background:linear-gradient(135deg,var(--a),var(--a2))}.toast-w{background:linear-gradient(135deg,var(--o),var(--o2))}

/* Safe */
.safe-display{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 40%,#fcd34d 100%);border:2px solid var(--o);border-radius:var(--r4);padding:32px;text-align:center;margin-bottom:22px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(245,158,11,.15)}
.safe-display::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 35%,rgba(255,255,255,.35),transparent 55%);pointer-events:none}
.safe-display .safe-title{font-size:13px;color:var(--o2);font-weight:600;position:relative}
.safe-display .safe-amount{font-size:42px;font-weight:900;color:var(--p);margin:10px 0;letter-spacing:-1.5px;position:relative}
.safe-display .safe-currency{font-size:12px;color:var(--t2);position:relative}

/* Receipt */
.receipt-box{background:#fff;border:2px dashed #d1d5db;border-radius:var(--r2);padding:28px;max-width:400px;margin:0 auto;font-family:'Courier New',monospace;font-size:11px;text-align:center;line-height:1.7}
.receipt-box h3{font-family:system-ui;font-size:16px;font-weight:800;margin-bottom:2px}
.receipt-divider{border:none;border-top:1px dashed #9ca3af;margin:8px 0}

/* Timeline / Audit */
.timeline{padding:12px 0}
.timeline-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9;position:relative}
.timeline-item:last-child{border-bottom:none}
.timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--a);margin-top:4px;flex-shrink:0;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.timeline-dot.edit{background:var(--o)}
.timeline-dot.create{background:var(--g)}
.timeline-dot.delete{background:var(--r)}
.timeline-content{flex:1}
.timeline-date{font-size:10px;color:var(--t3)}
.timeline-title{font-size:12px;font-weight:600;color:var(--t)}
.timeline-desc{font-size:11px;color:var(--t2);margin-top:2px}
.timeline-changes{margin-top:6px;background:var(--c2);border-radius:var(--r);padding:8px 12px;font-size:10px}
.timeline-changes .change-row{display:flex;gap:8px;padding:2px 0}
.timeline-changes .change-field{font-weight:600;color:var(--t2);min-width:80px}
.timeline-changes .change-old{color:var(--r);text-decoration:line-through}
.timeline-changes .change-new{color:var(--g);font-weight:600}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--b);margin-bottom:16px}
.tab-btn{padding:10px 18px;font-size:12px;font-weight:600;color:var(--t3);cursor:pointer;border:none;background:none;font-family:inherit;transition:all var(--transition);border-bottom:2px solid transparent;margin-bottom:-2px;border-radius:var(--r) var(--r) 0 0}
.tab-btn:hover{color:var(--t);background:var(--c2)}
.tab-btn.active{color:var(--a);border-bottom-color:var(--a);background:rgba(59,130,246,.05)}
.tab-content{display:none}
.tab-content.active{display:block;animation:pageIn .2s ease}

/* Diff highlight */
.diff-added{background:#dcfce7;padding:1px 4px;border-radius:3px}
.diff-removed{background:#fee2e2;padding:1px 4px;border-radius:3px;text-decoration:line-through}

/* Responsive */
.mobile-menu{display:none;position:fixed;top:12px;right:12px;z-index:200}
.mobile-menu button{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border:none;width:42px;height:42px;border-radius:var(--r2);font-size:18px;cursor:pointer;box-shadow:var(--sh3)}
@media(max-width:768px){
.sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}
.main{margin-right:0;padding:16px}
.mobile-menu{display:block}
.stats-row{grid-template-columns:repeat(2,1fr)}
.form-row{grid-template-columns:1fr}
.form-group.span-2{grid-column:span 1}
}
@media print{
.sidebar,.topbar-actions,.mobile-menu,.no-print{display:none!important}
.main{margin:0!important;padding:10px!important}
.card{box-shadow:none!important;break-inside:avoid}
}
</style>
</head>
<body>

<div class="mobile-menu"><button onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button></div>

<div class="layout">
<nav class="sidebar" id="sidebar">
<div class="sidebar-header">
<span class="logo-icon">✨</span>
<div class="logo-text">نور الخليج</div>
<div class="logo-sub">سوق نايف • نظام إدارة متكامل</div>
</div>
<div class="sidebar-nav" id="sidebarNav"></div>
<div class="sidebar-footer">
<div class="sync-badge"><div class="sync-dot" id="syncDot"></div><span id="syncText">متصل ومتزامن</span></div>
<div style="font-size:8px;color:rgba(255,255,255,.15);margin-top:6px;text-align:center">V6.0 PRO • <span id="deviceId"></span></div>
</div>
</nav>

<main class="main" id="mainContent"></main>
</div>

<div class="modal-backdrop" id="modal" onclick="if(event.target===this)closeModal()">
<div class="modal-box" id="modalBox"></div>
</div>

<div class="toast-area" id="toasts"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
"use strict";

// ══════════════════════════════════════
// DATABASE
// ══════════════════════════════════════
const S={
  p:'nkv55_',
  g(k,d){try{const r=localStorage.getItem(this.p+k);return r?JSON.parse(r):d}catch{return d}},
  s(k,v){try{localStorage.setItem(this.p+k,JSON.stringify(v));Sync.dirty()}catch(e){notify('⚠️ مساحة التخزين ممتلئة','e')}},
  sz(){let t=0;Object.keys(localStorage).filter(k=>k.startsWith(this.p)).forEach(k=>t+=localStorage.getItem(k).length);return(t/1024/1024).toFixed(2)}
};

// ══════════════════════════════════════
// DATA ACCESS
// ══════════════════════════════════════
const D={
  products:()=>S.g('products',[]),
  categories:()=>S.g('categories',defCats()),
  customers:()=>S.g('customers',[]),
  suppliers:()=>S.g('suppliers',[]),
  invoices:()=>S.g('invoices',[]),
  purchases:()=>S.g('purchases',[]),
  returns:()=>S.g('returns',[]),
  expenses:()=>S.g('expenses',[]),
  stockMoves:()=>S.g('stockMoves',[]),
  safeTxns:()=>S.g('safeTxns',[]),
  ledger:()=>S.g('ledger',[]),
  held:()=>S.g('held',[]),
  auditLog:()=>S.g('auditLog',[]),
  settings:()=>S.g('settings',defSettings()),
};
const sv=(k,v)=>S.s(k,v);

function defCats(){return[
{id:'c1',name:'عطور رشاش',icon:'🌿',color:'#059669'},
{id:'c2',name:'دفيوزر',icon:'💧',color:'#7c3aed'},
{id:'c3',name:'بخور',icon:'🔥',color:'#dc2626'},
{id:'c4',name:'عود طبيعي',icon:'🪵',color:'#d97706'},
{id:'c5',name:'دهن عود',icon:'💎',color:'#2563eb'},
{id:'c6',name:'معمول',icon:'🟤',color:'#78350f'},
{id:'c7',name:'مبخرة',icon:'🏺',color:'#64748b'},
{id:'c8',name:'إكسسوارات',icon:'✨',color:'#db2777'}
]}

function defSettings(){return{
storeName:'محل نور الخليج',storeLoc:'سوق نايف - دبي',storePhone:'',storeTRN:'',
taxRate:5,currency:'د.إ',invPfx:'NK-',invCtr:1000,poPfx:'PO-',poCtr:500,
safeBalance:0,deviceId:'DEV-'+Math.random().toString(36).substr(2,6).toUpperCase(),
lowStock:5,autoBackupMin:10
}}

// ══════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════
const uid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,6);
const now=()=>new Date().toISOString();
const today=()=>now().split('T')[0];
const month=()=>today().substring(0,7);
const fd=d=>d?new Date(d).toLocaleDateString('ar-AE'):'—';
const ft=d=>d?new Date(d).toLocaleTimeString('ar-AE',{hour:'2-digit',minute:'2-digit'}):'';
const fm=n=>(parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const el=id=>document.getElementById(id);
const qs=(s,p)=>(p||document).querySelector(s);
const qsa=(s,p)=>(p||document).querySelectorAll(s);

function nextInvNum(){const s=D.settings();s.invCtr++;sv('settings',s);return(s.invPfx||'NK-')+s.invCtr}
function nextPoNum(){const s=D.settings();s.poCtr++;sv('settings',s);return(s.poPfx||'PO-')+s.poCtr}

// ══════════════════════════════════════
// AUDIT LOG SYSTEM (NEW!)
// ══════════════════════════════════════
function audit(action, entityType, entityId, entityRef, changes, description){
  const log = D.auditLog();
  log.unshift({
    id: uid(),
    date: now(),
    action, // 'create','update','delete','view'
    entityType, // 'invoice','purchase','product', etc
    entityId,
    entityRef, // invoice number etc
    changes, // [{field, oldVal, newVal}]
    description,
    deviceId: D.settings().deviceId
  });
  // Keep last 500 entries
  if(log.length > 500) log.length = 500;
  sv('auditLog', log);
}

// ══════════════════════════════════════
// NOTIFICATIONS
// ══════════════════════════════════════
function notify(msg,type='s',dur=3000){
  const c=el('toasts');const t=document.createElement('div');
  t.className=`toast-msg toast-${type}`;t.innerHTML=msg;c.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),400)},dur);
}

// SYNC
// ══════════════════════════════════════
const Sync={
  _ch:null,
  init(){
    try{
      this._ch=new BroadcastChannel('nk_sync_v55');
      this._ch.onmessage=e=>{
        if(e.data?.type==='update'&&e.data.dev!==D.settings().deviceId){
          this._status('syncing');
          setTimeout(()=>{this._status('online');const b=qs('.nav-btn.active');if(b)b.click()},800);
        }
      };
    }catch{}
    window.addEventListener('storage',e=>{
      if(e.key?.startsWith(S.p)){this._status('syncing');setTimeout(()=>this._status('online'),500)}
    });
    setInterval(()=>this.backup(),(D.settings().autoBackupMin||10)*60*1000);
    this._status('online');
  },
  dirty(){if(this._ch)try{this._ch.postMessage({type:'update',dev:D.settings().deviceId,t:now()})}catch{}},
  _status(s){
    const d=el('syncDot'),t=el('syncText');if(!d)return;
    const m={online:{c:'#10b981',t:'متصل ومتزامن'},offline:{c:'#ef4444',t:'غير متصل'},syncing:{c:'#f59e0b',t:'مزامنة...'}};
    const v=m[s]||m.online;d.style.background=v.c;d.style.boxShadow=`0 0 6px ${v.c}60`;t.textContent=v.t;
  },
  backup(){try{S.s('_auto',{v:'5.5',t:now(),d:{products:D.products(),categories:D.categories(),customers:D.customers(),suppliers:D.suppliers(),invoices:D.invoices(),purchases:D.purchases(),returns:D.returns(),expenses:D.expenses(),stockMoves:D.stockMoves(),safeTxns:D.safeTxns(),ledger:D.ledger(),held:D.held(),auditLog:D.auditLog(),settings:D.settings()}});S.s('_lastBk',now())}catch{}},
  exportBackup(){
    const d={v:'5.5',t:now(),dev:D.settings().deviceId,d:{products:D.products(),categories:D.categories(),customers:D.customers(),suppliers:D.suppliers(),invoices:D.invoices(),purchases:D.purchases(),returns:D.returns(),expenses:D.expenses(),stockMoves:D.stockMoves(),safeTxns:D.safeTxns(),ledger:D.ledger(),held:D.held(),auditLog:D.auditLog(),settings:D.settings()}};
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`NoorAlKhaleej_${today()}.json`;a.click();
    S.s('_lastBk',now());notify('📤 تم تصدير النسخة الاحتياطية');
  },
  async importBackup(file){
    return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{try{res(JSON.parse(e.target.result))}catch(err){rej(err)}};r.onerror=rej;r.readAsText(file)});
  },
  restore(bk){
    if(!bk?.d)throw new Error('ملف غير صالح');
    Object.keys(bk.d).forEach(k=>{if(bk.d[k])sv(k,bk.d[k])});
  }
};

// ══════════════════════════════════════
// BUSINESS LOGIC
// ══════════════════════════════════════
function adjustStock(pid,qty,type,reason,ref){
  const ps=D.products();const p=ps.find(x=>x.id===pid);if(!p)return;
  const before=p.stock||0;
  let after=before;
  if(type==='in')after=before+qty;
  else if(type==='out')after=Math.max(0,before-qty);
  else after=qty;
  p.stock=after;p.lastUpdated=now();sv('products',ps);
  const ms=D.stockMoves();
  ms.unshift({id:uid(),date:now(),productId:pid,productName:p.name,type,qty,before,after,reason,ref});
  sv('stockMoves',ms);
  if(after<=(p.minStock||D.settings().lowStock||5)&&after>0)notify(`⚠️ مخزون منخفض: ${p.name} (${after})`,'w');
  else if(after<=0)notify(`🔴 نفذ: ${p.name}`,'e');
}

function safeTxn(type,amount,desc,ref){
  const s=D.settings();const before=s.safeBalance||0;
  if(type==='deposit')s.safeBalance=before+amount;
  else{if(amount>before){notify('❌ رصيد غير كافٍ','e');return false}s.safeBalance=before-amount}
  sv('settings',s);
  const txs=D.safeTxns();txs.unshift({id:uid(),date:now(),type,amount,desc,before,after:s.safeBalance,ref});
  sv('safeTxns',txs);return true;
}

function addLedger(type,desc,debit,credit,ref){
  const es=D.ledger();const lastBal=es.length?es[0].balance:0;
  es.unshift({id:uid(),date:now(),type,desc,debit:debit||0,credit:credit||0,balance:lastBal+(debit||0)-(credit||0),ref});
  sv('ledger',es);
}

function switchTab(btn, tabId) {
  const modal = el('modalBox');
  qsa('.tab-btn', modal).forEach(b => b.classList.remove('active'));
  qsa('.tab-content', modal).forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  el('tc-' + tabId).classList.add('active');
}

function saveInvoiceEdits(invId) {
  const invs = D.invoices();
  const inv = invs.find(i => i.id === invId);
  if (!inv) return;

  const changes = [];
  const s = D.settings();

  // Check discount change
  const newDisc = parseFloat(el('editDisc')?.value) || 0;
  if (newDisc !== (inv.discount || 0)) {
    changes.push({ field: 'الخصم', oldVal: fm(inv.discount || 0), newVal: fm(newDisc) });
  }

  // Check paid change
  const newPaid = parseFloat(el('editPaid')?.value) || 0;
  if (newPaid !== (inv.paid || 0)) {
    changes.push({ field: 'المدفوع', oldVal: fm(inv.paid || 0), newVal: fm(newPaid) });
    // Handle safe transaction for the difference
    const diff = newPaid - (inv.paid || 0);
    if (diff > 0) {
      safeTxn('deposit', diff, `تعديل فاتورة ${inv.num} — دفعة إضافية`, inv.id);
      addLedger('receipt', `تحصيل إضافي - تعديل ${inv.num}`, diff, 0, inv.id);
    } else if (diff < 0) {
      safeTxn('withdraw', Math.abs(diff), `تعديل فاتورة ${inv.num} — استرداد`, inv.id);
      addLedger('refund', `استرداد - تعديل ${inv.num}`, 0, Math.abs(diff), inv.id);
    }
  }

  // Check payment method
  const newPayMethod = el('editPayMethod')?.value || 'cash';
  if (newPayMethod !== inv.payMethod) {
    changes.push({ field: 'طريقة الدفع', oldVal: inv.payMethod, newVal: newPayMethod });
  }

  // Check notes
  const newNotes = el('editNotes')?.value || '';
  if (newNotes !== (inv.notes || '')) {
    changes.push({ field: 'ملاحظات', oldVal: inv.notes || '—', newVal: newNotes || '—' });
  }

  // Check item changes
  const editQtys = qsa('.edit-item-qty');
  const editPrices = qsa('.edit-item-price');
  editQtys.forEach((input, i) => {
    const newQty = parseInt(input.value) || 0;
    const newPrice = parseFloat(editPrices[i]?.value) || 0;
    const oldItem = inv.items[i];
    if (!oldItem) return;

    if (newQty !== oldItem.qty) {
      changes.push({ field: `كمية: ${oldItem.name}`, oldVal: oldItem.qty, newVal: newQty });
      // Adjust stock
      const diff = oldItem.qty - newQty;
      if (diff > 0) adjustStock(oldItem.productId, diff, 'in', `تعديل فاتورة ${inv.num}`, inv.id);
      else if (diff < 0) adjustStock(oldItem.productId, Math.abs(diff), 'out', `تعديل فاتورة ${inv.num}`, inv.id);
      oldItem.qty = newQty;
    }
    if (newPrice !== oldItem.price) {
      changes.push({ field: `سعر: ${oldItem.name}`, oldVal: fm(oldItem.price), newVal: fm(newPrice) });
      oldItem.price = newPrice;
    }
  });

  if (!changes.length) {
    notify('ℹ️ لا توجد تعديلات', 'i');
    return;
  }

  // Recalculate totals
  inv.discount = newDisc;
  inv.payMethod = newPayMethod;
  inv.notes = newNotes;
  inv.subtotal = inv.items.reduce((s, it) => s + it.price * it.qty, 0);
  const afterDisc = Math.max(0, inv.subtotal - inv.discount);
  inv.tax = afterDisc * ((s.taxRate || 5) / 100);
  inv.total = afterDisc + inv.tax;
  inv.paid = newPaid;
  inv.remaining = Math.max(0, inv.total - inv.paid);
  inv.status = inv.remaining > 0 ? 'partial' : 'paid';
  inv.costTotal = inv.items.reduce((s, it) => s + (it.costPrice || 0) * it.qty, 0);
  inv.profit = afterDisc - inv.costTotal;
  inv.lastModified = now();

  // Update customer balance
  if (inv.customerId) {
    const custs = D.customers();
    const cust = custs.find(c => c.id === inv.customerId);
    if (cust) {
      // Recalculate balance from all invoices
      const custInvs = invs.filter(i => i.customerId === cust.id);
      cust.balance = custInvs.reduce((s, i) => s + (i.remaining || 0), 0);
      sv('customers', custs);
    }
  }

  sv('invoices', invs);

  // Record audit
  audit('update', 'invoice', inv.id, inv.num, changes, `تعديل الفاتورة ${inv.num}`);

  closeModal();
  notify('✅ تم تعديل الفاتورة — التعديلات مسجلة في سجل المراجعة');
  nav(curPage);
}

function savePurchaseEdits(purchId) {
  const purchs = D.purchases();
  const p = purchs.find(x => x.id === purchId);
  if (!p) return;

  const changes = [];
  const newPaid = parseFloat(el('editPuPaid')?.value) || 0;
  const newRef = el('editPuRef')?.value || '';
  const newNotes = el('editPuNotes')?.value || '';

  if (newPaid !== (p.paid || 0)) {
    changes.push({ field: 'المدفوع', oldVal: fm(p.paid||0), newVal: fm(newPaid) });
    const diff = newPaid - (p.paid || 0);
    if (diff > 0) {
      safeTxn('withdraw', diff, `دفعة إضافية - تعديل ${p.num}`, p.id);
      addLedger('payment', `دفع إضافي - ${p.num}`, diff, 0, p.id);
    }
  }
  if (newRef !== (p.ref || '')) changes.push({ field: 'المرجع', oldVal: p.ref||'—', newVal: newRef||'—' });
  if (newNotes !== (p.notes || '')) changes.push({ field: 'ملاحظات', oldVal: p.notes||'—', newVal: newNotes||'—' });

  if (!changes.length) { notify('ℹ️ لا توجد تعديلات', 'i'); return; }

  p.paid = newPaid;
  p.remaining = Math.max(0, p.total - p.paid);
  p.ref = newRef;
  p.notes = newNotes;
  p.lastModified = now();

  // Update supplier balance
  if (p.supplierId) {
    const supps = D.suppliers();
    const supp = supps.find(s => s.id === p.supplierId);
    if (supp) {
      const suppPurchs = purchs.filter(x => x.supplierId === supp.id);
      supp.balance = suppPurchs.reduce((s, x) => s + (x.remaining || 0), 0);
      sv('suppliers', supps);
    }
  }

  sv('purchases', purchs);
  audit('update', 'purchase', p.id, p.num, changes, `تعديل فاتورة شراء ${p.num}`);
  closeModal();
  notify('✅ تم تعديل فاتورة الشراء');
  nav(curPage);
}

function filterAuditLog() {
  const filter = el('auditFilter')?.value || '';
  qsa('#auditTimeline .timeline-item').forEach(item => {

    const action = item.dataset.action;
    if (!filter) item.style.display = '';
    else if (filter === 'update') item.style.display = action === 'update' ? '' : 'none';
    else item.style.display = type === filter ? '' : 'none';
  });
}

function clearAuditLog() {
  if (!confirm('حذف سجل التعديلات؟')) return;
  sv('auditLog', []);
  nav('auditlog');
  notify('🗑️ تم مسح السجل');
}

function calcPos(){const s=D.settings();const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);const dv=parseFloat(el('posDiscV')?.value)||0;const dt=el('posDiscT')?.value||'amt';const disc=dt==='pct'?sub*(dv/100):dv;const after=Math.max(0,sub-disc);const tax=after*((s.taxRate||5)/100);const tot=after+tax;if(el('posSub'))el('posSub').textContent=fm(sub);if(el('posTaxV'))el('posTaxV').textContent=fm(tax);if(el('posTotV'))el('posTotV').textContent=fm(tot);calcChange()}

function setPM(m,btn){payM=m;qsa('#payBtns .btn').forEach(b=>{b.className='btn btn-sm btn-ghost'});if(btn)btn.className='btn btn-sm btn-primary';const ps=el('paidSec');if(ps)ps.style.display=m==='credit'?'none':'flex'}

function doSale(){
  if(!cart.length){notify('❌ فارغة','e');return}
  const s=D.settings();const sub=cart.reduce((sm,c)=>sm+c.price*c.qty,0);const costTot=cart.reduce((sm,c)=>sm+c.cost*c.qty,0);
  const dv=parseFloat(el('posDiscV')?.value)||0;const dt=el('posDiscT')?.value||'amt';const disc=dt==='pct'?sub*(dv/100):dv;
  const after=Math.max(0,sub-disc);const tax=after*((s.taxRate||5)/100);const tot=after+tax;const profit=after-costTot;
  const pd=payM==='credit'?0:(parseFloat(el('posPaidV')?.value)||tot);const rem=Math.max(0,tot-pd);
  const cid=el('posCust')?.value||'';const custs=D.customers();const cust=cid?custs.find(c=>c.id===cid):null;
  const num=nextInvNum();
  const inv={id:uid(),num,customerId:cid,customerName:cust?.name||'نقدي',saleType:el('posST')?.value||'retail',items:cart.map(c=>({...c,productId:c.pid})),subtotal:sub,discount:disc,discountType:dt,tax,total:tot,paid:pd,remaining:rem,costTotal:costTot,profit,payMethod:payM,date:now(),status:rem>0?'partial':'paid'};
  const invs=D.invoices();invs.unshift(inv);sv('invoices',invs);
  cart.forEach(c=>adjustStock(c.pid,c.qty,'out',`بيع - ${num}`,inv.id));
  if(pd>0&&payM!=='credit')safeTxn('deposit',pd,`مبيعات - ${num} - ${inv.customerName}`,inv.id);
  if(cust&&rem>0){cust.balance=(cust.balance||0)+rem;sv('customers',custs)}
  addLedger('sale',`فاتورة ${num} - ${inv.customerName}`,tot,0,inv.id);
  if(pd>0)addLedger('receipt',`تحصيل ${num}`,0,pd,inv.id);
  audit('create','invoice',inv.id,inv.num,null,`إنشاء فاتورة ${num} — ${fm(tot)} — ${inv.customerName}`);
  viewInvoiceDetail(inv.id);
  cart=[];if(el('posDiscV'))el('posDiscV').value=0;if(el('posPaidV'))el('posPaidV').value='';updCart();renderPosProds();
  notify(`✅ تم البيع — ${num}`);
}

function collectInvoice(invId){
  const invs=D.invoices();const inv=invs.find(i=>i.id===invId);if(!inv||!inv.remaining)return;
  const amt=parseFloat(prompt(`المبلغ (المتبقي: ${fm(inv.remaining)}):`));
  if(!amt||amt<=0)return;const actual=Math.min(amt,inv.remaining);
  const oldPaid=inv.paid;inv.paid+=actual;inv.remaining=Math.max(0,inv.total-inv.paid);
  if(inv.remaining<=0)inv.status='paid';inv.lastModified=now();sv('invoices',invs);
  safeTxn('deposit',actual,`تحصيل ${inv.num}`,inv.id);
  addLedger('receipt',`تحصيل ${inv.num} من ${inv.customerName}`,actual,0,inv.id);
  if(inv.customerId){const cs=D.customers();const c=cs.find(x=>x.id===inv.customerId);if(c){c.balance=Math.max(0,(c.balance||0)-actual);sv('customers',cs)}}
  audit('update','invoice',inv.id,inv.num,[{field:'المدفوع',oldVal:fm(oldPaid),newVal:fm(inv.paid)},{field:'المتبقي',oldVal:fm(oldPaid+actual>inv.total?0:inv.remaining+actual),newVal:fm(inv.remaining)}],`تحصيل ${fm(actual)} من فاتورة ${inv.num}`);
  nav(curPage);notify('✅ تم التحصيل');
}

function deleteInvoice(invId){
  if(!confirm('حذف هذه الفاتورة نهائياً؟'))return;
  const invs=D.invoices();const inv=invs.find(i=>i.id===invId);
  if(inv){audit('delete','invoice',inv.id,inv.num,null,`حذف فاتورة ${inv.num}`);}
  sv('invoices',invs.filter(i=>i.id!==invId));nav(curPage);notify('🗑️ تم');
}

  const ws=XLSX.utils.json_to_sheet(d);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'فواتير');XLSX.writeFile(wb,`invoices_${today()}.xlsx`);notify('📥 تم');
}

            <label style="font-size:11px;display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--t2)">

        </div>

          <span>الإجمالي (${cur}):</span><span id="puTot">0.00</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:13px">

          <div style="display:flex;gap:5px;align-items:center">
            <input class="input" id="puPd" type="number" step=".01" min="0" value="${edit?.paid||0}" style="width:110px;text-align:center" oninput="calcPuTotals()"/>
            <button class="btn btn-sm btn-ghost btn-sm" onclick="const t=parseFloat(el('puTot').textContent.replace(/,/g,''))||0;el('puPd').value=t.toFixed(2);calcPuTotals()" title="دفع الكامل">كامل</button>

          <span style="color:var(--t2)">المتبقي / آجل:</span>

  </div>

    <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
    <button class="btn btn-primary btn-lg" onclick="savePurch()">💾 ${edit?'تحديث الفاتورة':'حفظ الفاتورة'}</button>

  const firstOpt=el('puProd')?.selectedOptions[0];
  if(firstOpt&&el('puPr'))el('puPr').value=firstOpt.dataset.c||'';
  el('puProd').addEventListener('change',function(){const o=this.selectedOptions[0];if(o&&el('puPr'))el('puPr').value=o.dataset.c||''});
  renderPuI();
}

function calcPuTotals(){
  const sub=window._puI.reduce((s,it)=>s+it.qty*it.price,0);
  const dv=parseFloat(el('puDiscV')?.value)||0;
  const dt=el('puDiscT')?.value||'amt';
  const disc=dt==='pct'?sub*(dv/100):Math.min(dv,sub);
  const afterDisc=Math.max(0,sub-disc);
  const taxOn=el('puTaxOn')?.checked||false;
  const taxRate=D.settings().taxRate||5;
  const tax=taxOn?parseFloat((afterDisc*(taxRate/100)).toFixed(2)):0;
  const tot=parseFloat((afterDisc+tax).toFixed(2));
  const pd=parseFloat(el('puPd')?.value)||0;
  const rem=Math.max(0,parseFloat((tot-pd).toFixed(2)));
  if(el('puSub'))el('puSub').textContent=fm(sub);
  if(el('puTaxV'))el('puTaxV').textContent=fm(tax);
  if(el('puTot'))el('puTot').textContent=fm(tot);
  if(el('puRem')){el('puRem').textContent=fm(rem);el('puRem').style.color=rem>0?'var(--r)':'var(--g)';}
}

function addPuI(){
  const pid=el('puProd').value;
  const p=D.products().find(x=>x.id===pid);
  if(!p)return;
  const q=parseInt(el('puQty').value)||1;
  const pr=parseFloat(el('puPr').value);
  if(isNaN(pr)||pr<0){notify('❌ أدخل سعر صحيح','e');return}
  if(q<=0){notify('❌ الكمية يجب أن تكون أكبر من صفر','e');return}
  const ex=window._puI.find(x=>x.productId===pid);
  if(ex){ex.qty+=q;ex.price=pr}
  else window._puI.push({productId:pid,name:p.name,qty:q,price:pr});
  el('puQty').value=1;
  renderPuI();
}

function renderPuI(){
  el('puIList').innerHTML=window._puI.length
    ?window._puI.map((it,i)=>`
      <div style="display:grid;grid-template-columns:1fr 55px 90px 75px 32px;gap:6px;align-items:center;padding:7px 10px;background:var(--c2);border-radius:var(--r);margin-bottom:5px;font-size:12px">
        <span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.name}</span>
        <input class="input" type="number" min="1" value="${it.qty}" style="padding:4px;text-align:center;font-size:11px" onchange="window._puI[${i}].qty=Math.max(1,parseInt(this.value)||1);renderPuI()"/>
        <input class="input" type="number" step=".01" min="0" value="${it.price}" style="padding:4px;text-align:center;font-size:11px" onchange="window._puI[${i}].price=parseFloat(this.value)||0;renderPuI()"/>
        <span style="font-weight:700;text-align:center;font-size:11px">${fm(it.qty*it.price)}</span>
        <button onclick="window._puI.splice(${i},1);renderPuI()" style="background:none;border:none;color:var(--r);cursor:pointer;font-size:16px;line-height:1;padding:0">✕</button>
      </div>`).join('')
    :'<div style="text-align:center;color:var(--t3);padding:14px;font-size:12px;border:1px dashed var(--b);border-radius:var(--r)">لم تُضف أي منتجات بعد</div>';
  calcPuTotals();
}

function savePurch(){
  if(!window._puI.length){notify('❌ أضف منتجات أولاً','e');return}
  const s=D.settings();
  const sub=window._puI.reduce((sm,it)=>sm+it.qty*it.price,0);
  const dv=parseFloat(el('puDiscV')?.value)||0;
  const dt=el('puDiscT')?.value||'amt';
  const disc=dt==='pct'?sub*(dv/100):Math.min(dv,sub);
  const afterDisc=Math.max(0,sub-disc);
  const taxOn=el('puTaxOn')?.checked||false;
  const tax=taxOn?parseFloat((afterDisc*((s.taxRate||5)/100)).toFixed(2)):0;
  const tot=parseFloat((afterDisc+tax).toFixed(2));
  const pd=parseFloat(el('puPd')?.value)||0;
  const rem=parseFloat(Math.max(0,tot-pd).toFixed(2));
  const sid=el('puSup')?.value||'';
  const supps=D.suppliers();
  const sup=supps.find(x=>x.id===sid);
  const dateVal=el('puDate')?.value||today();
  const notes=el('puNotes')?.value||'';

  if(window._puEditId){
    const ps=D.purchases();
    const old=ps.find(x=>x.id===window._puEditId);
    if(!old){notify('❌ الفاتورة غير موجودة','e');return}
    const changes=[];
    if(Math.abs(old.total-tot)>0.01)changes.push({field:'الإجمالي',oldVal:fm(old.total),newVal:fm(tot)});
    if(Math.abs((old.paid||0)-pd)>0.01)changes.push({field:'المدفوع',oldVal:fm(old.paid||0),newVal:fm(pd)});
    if(Math.abs((old.tax||0)-tax)>0.01)changes.push({field:'الضريبة',oldVal:fm(old.tax||0),newVal:fm(tax)});
    if((old.discount||0)!==disc)changes.push({field:'الخصم',oldVal:fm(old.discount||0),newVal:fm(disc)});
    Object.assign(old,{supplierId:sid,supplierName:sup?.name||'—',ref:el('puRef')?.value||'',
      items:[...window._puI],subtotal:sub,discount:disc,discountType:dt,
      tax,taxEnabled:taxOn,total:tot,paid:pd,remaining:rem,notes,lastModified:now()});
    sv('purchases',ps);
    if(sup){sup.balance=ps.filter(x=>x.supplierId===sid).reduce((s,x)=>s+(x.remaining||0),0);sv('suppliers',supps)}
    audit('update','purchase',old.id,old.num,changes,`تعديل فاتورة شراء ${old.num}`);
    closeModal();nav('purchases');notify('✅ تم تحديث الفاتورة');
    return;
  }

  const num=nextPoNum();
  const purch={id:uid(),num,supplierId:sid,supplierName:sup?.name||'—',
    ref:el('puRef')?.value||'',items:[...window._puI],
    subtotal:sub,discount:disc,discountType:dt,
    tax,taxEnabled:taxOn,total:tot,paid:pd,remaining:rem,
    notes,date:dateVal+'T'+now().split('T')[1]};
  const ps=D.purchases();ps.unshift(purch);sv('purchases',ps);
  window._puI.forEach(it=>{
    adjustStock(it.productId,it.qty,'in',`شراء - ${num}`,purch.id);
    const prods=D.products();const p=prods.find(x=>x.id===it.productId);
    if(p){p.costPrice=it.price;sv('products',prods)}
  });
  if(pd>0){safeTxn('withdraw',pd,`مشتريات - ${num} - ${purch.supplierName}`,purch.id);addLedger('payment',`دفع ${num}`,pd,0,purch.id)}
  addLedger('purchase',`مشتريات ${num} - ${purch.supplierName}`,0,tot,purch.id);
  if(sup&&rem>0){sup.balance=(sup.balance||0)+rem;sv('suppliers',supps)}
  audit('create','purchase',purch.id,purch.num,null,`إنشاء فاتورة شراء ${num} — ${fm(tot)}${taxOn?' (ضريبة: '+fm(tax)+')':''}`);
  closeModal();nav('purchases');
  notify(`✅ تم الحفظ — ${num}${taxOn?' | ضريبة: '+fm(tax):''}`);
}

function payPurchase(pid){
  const ps=D.purchases();const p=ps.find(x=>x.id===pid);if(!p||!p.remaining)return;
  const amt=parseFloat(prompt(`المبلغ (المتبقي: ${fm(p.remaining)}):`));if(!amt||amt<=0)return;
  const actual=Math.min(amt,p.remaining);const oldPaid=p.paid;
  p.paid+=actual;p.remaining=Math.max(0,p.total-p.paid);p.lastModified=now();sv('purchases',ps);
  safeTxn('withdraw',actual,`سداد ${p.num}`,p.id);addLedger('payment',`سداد ${p.num}`,actual,0,p.id);
  if(p.supplierId){const ss=D.suppliers();const s=ss.find(x=>x.id===p.supplierId);if(s){s.balance=Math.max(0,(s.balance||0)-actual);sv('suppliers',ss)}}
  audit('update','purchase',p.id,p.num,[{field:'المدفوع',oldVal:fm(oldPaid),newVal:fm(p.paid)}],`دفع ${fm(actual)} لفاتورة ${p.num}`);
  nav(curPage);notify('✅ تم الدفع');
}

function saveProd(pid){
  const n=el('pfN')?.value?.trim();if(!n){notify('❌ الاسم','e');return}
  const d={name:n,barcode:el('pfB')?.value?.trim()||'',categoryId:el('pfC')?.value||'',costPrice:parseFloat(el('pfCo')?.value)||0,wholesalePrice:parseFloat(el('pfW')?.value)||0,retailPrice:parseFloat(el('pfR')?.value)||0,stock:parseInt(el('pfS')?.value)||0,minStock:parseInt(el('pfM')?.value)||5,lastUpdated:now()};
  const ps=D.products();
  if(pid){
    const old=ps.find(p=>p.id===pid);
    if(old){
      const changes=[];
      if(old.name!==d.name)changes.push({field:'الاسم',oldVal:old.name,newVal:d.name});
      if(old.retailPrice!==d.retailPrice)changes.push({field:'سعر المفرق',oldVal:fm(old.retailPrice),newVal:fm(d.retailPrice)});
      if(old.wholesalePrice!==d.wholesalePrice)changes.push({field:'سعر الجملة',oldVal:fm(old.wholesalePrice),newVal:fm(d.wholesalePrice)});
      if(old.stock!==d.stock)changes.push({field:'المخزون',oldVal:old.stock,newVal:d.stock});
      if(changes.length)audit('update','product',pid,old.name,changes,`تعديل منتج ${old.name}`);
    }
    const i=ps.findIndex(p=>p.id===pid);if(i>=0)ps[i]={...ps[i],...d};
  }else{d.id=uid();d.createdAt=now();ps.push(d);audit('create','product',d.id,d.name,null,`إنشاء منتج ${d.name}`);}
  sv('products',ps);closeModal();nav('products');notify('✅ تم');
}
function delProd(pid){if(!confirm('حذف؟'))return;const p=D.products().find(x=>x.id===pid);if(p)audit('delete','product',pid,p.name,null,`حذف منتج ${p.name}`);sv('products',D.products().filter(p=>p.id!==pid));nav('products');notify('🗑️ تم')}
function expProdsXl(){const d=D.products().map(p=>({الاسم:p.name,باركود:p.barcode||'',تكلفة:p.costPrice||0,جملة:p.wholesalePrice||0,مفرق:p.retailPrice||0,مخزون:p.stock||0}));const ws=XLSX.utils.json_to_sheet(d);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'منتجات');XLSX.writeFile(wb,`products_${today()}.xlsx`);notify('📥 تم')}

function saveRet(){const t=el('rtT').value,pid=el('rtP').value,p=D.products().find(x=>x.id===pid);if(!p)return;const q=parseInt(el('rtQ').value)||1,a=parseFloat(el('rtA').value)||0,reason=el('rtR').value,ref='RET-'+uid().substr(0,6).toUpperCase();const ret={id:uid(),returnType:t,productId:pid,productName:p.name,qty:q,amount:a,reason,ref,date:now()};const rs=D.returns();rs.unshift(ret);sv('returns',rs);if(t==='sale'){adjustStock(pid,q,'in',`مرتجع بيع ${ref}`,ret.id);if(a>0){safeTxn('withdraw',a,`رد مرتجع ${ref}`,ret.id);addLedger('refund',`مرتجع بيع ${ref}`,0,a,ret.id)}}else{adjustStock(pid,q,'out',`مرتجع شراء ${ref}`,ret.id);if(a>0){safeTxn('deposit',a,`استرداد ${ref}`,ret.id);addLedger('refund',`مرتجع شراء ${ref}`,a,0,ret.id)}}closeModal();nav('returns');notify('✅ تم')}

function pgCustomers(c){const cs=D.customers();c.innerHTML=`<div class="topbar"><h2>👥 العملاء (${cs.length})</h2><div class="topbar-actions"><button class="btn btn-primary" onclick="personForm('customer')">+ عميل</button></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>#</th><th>الاسم</th><th>هاتف</th><th>نوع</th><th>مشتريات</th><th>مستحق</th><th></th></tr></thead><tbody>${cs.length?cs.map((c,i)=>{const t=D.invoices().filter(inv=>inv.customerId===c.id).reduce((s,inv)=>s+(inv.total||0),0);return`<tr><td>${i+1}</td><td><b>${c.name}</b></td><td style="font-family:monospace">${c.phone||'—'}</td><td><span class="badge ${c.type==='wholesale'?'bg-blue':'bg-green'}">${c.type==='wholesale'?'جملة':'مفرق'}</span></td><td>${fm(t)}</td><td style="color:${(c.balance||0)>0?'var(--r)':'var(--g)'};font-weight:700">${fm(c.balance||0)}</td><td><button class="btn btn-sm btn-ghost" onclick="personForm('customer','${c.id}')">✏️</button>${(c.balance||0)>0?` <button class="btn btn-sm btn-success" onclick="collectCust('${c.id}')">💰</button>`:''} <button class="btn btn-sm btn-danger" onclick="delPerson('customers','${c.id}')">🗑️</button></td></tr>`}).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--t3);padding:20px">—</td></tr>'}</tbody></table></div></div>`}
function pgSuppliers(c){const ss=D.suppliers();c.innerHTML=`<div class="topbar"><h2>🏭 الموردين (${ss.length})</h2><div class="topbar-actions"><button class="btn btn-primary" onclick="personForm('supplier')">+ مورد</button></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>#</th><th>الاسم</th><th>هاتف</th><th>شركة</th><th>مشتريات</th><th>مستحق</th><th></th></tr></thead><tbody>${ss.length?ss.map((s,i)=>{const t=D.purchases().filter(p=>p.supplierId===s.id).reduce((sm,p)=>sm+(p.total||0),0);return`<tr><td>${i+1}</td><td><b>${s.name}</b></td><td style="font-family:monospace">${s.phone||'—'}</td><td>${s.company||'—'}</td><td>${fm(t)}</td><td style="color:${(s.balance||0)>0?'var(--r)':'var(--g)'};font-weight:700">${fm(s.balance||0)}</td><td><button class="btn btn-sm btn-ghost" onclick="personForm('supplier','${s.id}')">✏️</button>${(s.balance||0)>0?` <button class="btn btn-sm btn-success" onclick="paySup('${s.id}')">💰</button>`:''} <button class="btn btn-sm btn-danger" onclick="delPerson('suppliers','${s.id}')">🗑️</button></td></tr>`}).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--t3);padding:20px">—</td></tr>'}</tbody></table></div></div>`}

function personForm(t,pid){const ic=t==='customer';const d=ic?D.customers():D.suppliers();const p=pid?d.find(x=>x.id===pid):{};openModal(`<div class="modal-header"><h3>${pid?'✏️':'➕'} ${ic?'عميل':'مورد'}</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="form-row"><div class="form-group"><label>الاسم <span class="req">*</span></label><input class="input" id="prN" value="${p.name||''}"/></div><div class="form-group"><label>هاتف</label><input class="input" id="prP" value="${p.phone||''}"/></div>${ic?`<div class="form-group"><label>نوع</label><select class="input" id="prT"><option value="retail" ${p.type==='retail'?'selected':''}>مفرق</option><option value="wholesale" ${p.type==='wholesale'?'selected':''}>جملة</option></select></div>`:`<div class="form-group"><label>شركة</label><input class="input" id="prCo" value="${p.company||''}"/></div>`}<div class="form-group span-all"><label>عنوان</label><input class="input" id="prA" value="${p.address||''}"/></div></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="savePerson('${t}','${pid||''}')">${pid?'💾':'➕'}</button></div>`)}
function savePerson(t,pid){const n=el('prN')?.value?.trim();if(!n){notify('❌','e');return}const ic=t==='customer';const k=ic?'customers':'suppliers';const d=ic?D.customers():D.suppliers();const p={name:n,phone:el('prP')?.value?.trim()||'',address:el('prA')?.value?.trim()||''};if(ic)p.type=el('prT')?.value||'retail';else p.company=el('prCo')?.value?.trim()||'';if(pid){const i=d.findIndex(x=>x.id===pid);if(i>=0)d[i]={...d[i],...p}}else{p.id=uid();p.balance=0;d.push(p)}sv(k,d);closeModal();nav(ic?'customers':'suppliers');notify('✅ تم')}
function delPerson(k,pid){if(!confirm('حذف؟'))return;sv(k,S.g(k,[]).filter(x=>x.id!==pid));nav(k==='customers'?'customers':'suppliers');notify('🗑️ تم')}
function collectCust(cid){const cs=D.customers();const c=cs.find(x=>x.id===cid);if(!c||!c.balance)return;const a=parseFloat(prompt(`(المستحق: ${fm(c.balance)}):`));if(!a||a<=0)return;const ac=Math.min(a,c.balance);c.balance=Math.max(0,c.balance-ac);sv('customers',cs);safeTxn('deposit',ac,`تحصيل من ${c.name}`,cid);addLedger('receipt',`تحصيل من ${c.name}`,ac,0,cid);nav('customers');notify('✅ تم')}
function paySup(sid){const ss=D.suppliers();const s=ss.find(x=>x.id===sid);if(!s||!s.balance)return;const a=parseFloat(prompt(`(المستحق: ${fm(s.balance)}):`));if(!a||a<=0)return;const ac=Math.min(a,s.balance);s.balance=Math.max(0,s.balance-ac);sv('suppliers',ss);safeTxn('withdraw',ac,`دفع للمورد ${s.name}`,sid);addLedger('payment',`دفع ${s.name}`,0,ac,sid);nav('suppliers');notify('✅ تم')}

function pgStockMoves(c){const ms=D.stockMoves();c.innerHTML=`<div class="topbar"><h2>🏪 حركة المخزون</h2><div class="topbar-actions"><button class="btn btn-success" onclick="stkForm('in')">📥 إدخال</button><button class="btn btn-warning" onclick="stkForm('out')">📤 إخراج</button><button class="btn btn-ghost" onclick="stkForm('set')">📋 جرد</button></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>#</th><th>تاريخ</th><th>منتج</th><th>نوع</th><th>كمية</th><th>قبل</th><th>بعد</th><th>سبب</th></tr></thead><tbody>${ms.length?ms.slice(0,60).map((m,i)=>`<tr><td>${i+1}</td><td style="font-size:10px">${fd(m.date)} ${ft(m.date)}</td><td>${m.productName}</td><td><span class="badge ${m.type==='in'?'bg-green':m.type==='out'?'bg-red':'bg-blue'}">${m.type==='in'?'📥':m.type==='out'?'📤':'📋'}</span></td><td style="font-weight:700">${m.qty||m.quantity}</td><td>${m.before}</td><td><b>${m.after}</b></td><td style="font-size:10px">${m.reason||'—'}</td></tr>`).join(''):'<tr><td colspan="8" style="text-align:center;color:var(--t3);padding:20px">—</td></tr>'}</tbody></table></div></div>`}
function stkForm(t){const ps=D.products();openModal(`<div class="modal-header"><h3>${t==='in'?'📥 إدخال':t==='out'?'📤 إخراج':'📋 جرد'}</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="form-row"><div class="form-group"><label>المنتج</label><select class="input" id="skP">${ps.map(p=>`<option value="${p.id}">${p.name} (${p.stock||0})</option>`).join('')}</select></div><div class="form-group"><label>${t==='set'?'الكمية الفعلية':'الكمية'}</label><input class="input" id="skQ" type="number" min="1" value="1"/></div><div class="form-group span-all"><label>سبب</label><input class="input" id="skR"/></div></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="saveStk('${t}')">💾</button></div>`)}
function saveStk(t){const pid=el('skP')?.value;const q=parseInt(el('skQ')?.value)||0;if(!pid||!q){notify('❌','e');return}const p=D.products().find(x=>x.id===pid);if(!p)return;if(t==='out'&&(p.stock||0)<q){notify('❌ غير كافٍ','e');return}adjustStock(pid,q,t,el('skR')?.value||'يدوي');closeModal();nav('stockmoves');notify('✅ تم')}

function pgCategories(c){const cs=D.categories();c.innerHTML=`<div class="topbar"><h2>🏷️ التصنيفات</h2><div class="topbar-actions"><button class="btn btn-primary" onclick="catForm()">+ تصنيف</button></div></div><div class="card"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">${cs.map(cat=>{const cnt=D.products().filter(p=>p.categoryId===cat.id).length;return`<div class="card" style="border-right:4px solid ${cat.color};padding:14px;margin:0"><div style="display:flex;justify-content:space-between"><div><span style="font-size:24px">${cat.icon}</span><div style="font-weight:700;margin-top:4px">${cat.name}</div><div style="font-size:10px;color:var(--t3)">${cnt} منتج</div></div><button class="btn btn-sm btn-danger" onclick="sv('categories',D.categories().filter(c=>c.id!=='${cat.id}'));nav('categories')">🗑️</button></div></div>`}).join('')}</div></div>`}
function catForm(){openModal(`<div class="modal-header"><h3>➕ تصنيف</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="form-row"><div class="form-group"><label>الاسم</label><input class="input" id="ctN"/></div><div class="form-group"><label>أيقونة</label><input class="input" id="ctI" value="📦"/></div><div class="form-group"><label>لون</label><input class="input" id="ctC" type="color" value="#059669"/></div></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="const n=el('ctN')?.value?.trim();if(!n)return notify('❌','e');const cs=D.categories();cs.push({id:uid(),name:n,icon:el('ctI').value,color:el('ctC').value});sv('categories',cs);closeModal();nav('categories');notify('✅ تم')">➕</button></div>`)}

function pgSafe(c){const s=D.settings(),txs=D.safeTxns();c.innerHTML=`<div class="topbar"><h2>🔐 الخزنة</h2><div class="topbar-actions"><button class="btn btn-success" onclick="safeForm('deposit')">📥 إيداع</button><button class="btn btn-danger" onclick="safeForm('withdraw')">📤 سحب</button></div></div><div class="safe-display"><div class="safe-title">💰 رصيد الخزنة</div><div class="safe-amount">${fm(s.safeBalance||0)}</div><div class="safe-currency">${s.currency||'د.إ'}</div></div><div class="card"><div class="card-title" style="margin-bottom:12px">📜 السجل</div><div class="table-wrap"><table><thead><tr><th>#</th><th>تاريخ</th><th>نوع</th><th>وصف</th><th>مبلغ</th><th>رصيد</th></tr></thead><tbody>${txs.length?txs.slice(0,50).map((t,i)=>`<tr><td>${i+1}</td><td style="font-size:10px">${fd(t.date)} ${ft(t.date)}</td><td><span class="badge ${t.type==='deposit'?'bg-green':'bg-red'}">${t.type==='deposit'?'📥':'📤'}</span></td><td style="font-size:11px">${t.desc||t.description}</td><td style="font-weight:700;color:${t.type==='deposit'?'var(--g)':'var(--r)'}">${t.type==='deposit'?'+':'-'}${fm(t.amount)}</td><td style="font-family:monospace">${fm(t.after!=null?t.after:t.balance)}</td></tr>`).join(''):'<tr><td colspan="6" style="text-align:center;color:var(--t3);padding:20px">—</td></tr>'}</tbody></table></div></div>`}
function safeForm(t){openModal(`<div class="modal-header"><h3>${t==='deposit'?'📥 إيداع':'📤 سحب'}</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="form-row"><div class="form-group"><label>المبلغ</label><input class="input" id="sfA" type="number" step=".01"/></div><div class="form-group span-all"><label>وصف</label><input class="input" id="sfD"/></div></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="const a=parseFloat(el('sfA')?.value)||0;if(!a)return notify('❌','e');const d=el('sfD')?.value||'${t==='deposit'?'إيداع':'سحب'} يدوي';const r=safeTxn('${t}',a,d);if(r===false)return;addLedger('${t}',d,${t==='deposit'?'a,0':'0,a'});closeModal();nav('safe');notify('✅ تم')">💾</button></div>`)}

function pgExpenses(c){const es=D.expenses();const tE=es.filter(e=>(e.date||'').startsWith(today())).reduce((s,e)=>s+(e.amount||0),0);const mE=es.filter(e=>(e.date||'').startsWith(month())).reduce((s,e)=>s+(e.amount||0),0);c.innerHTML=`<div class="topbar"><h2>💸 المصروفات</h2><div class="topbar-actions"><button class="btn btn-primary" onclick="expForm()">+ مصروف</button></div></div><div class="stats-row"><div class="stat" style="border-right-color:var(--r)"><div class="stat-val">${fm(tE)}</div><div class="stat-label">اليوم</div></div><div class="stat" style="border-right-color:var(--o)"><div class="stat-val">${fm(mE)}</div><div class="stat-label">الشهر</div></div></div><div class="card"><div class="table-wrap"><table><thead><tr><th>#</th><th>تاريخ</th><th>تصنيف</th><th>وصف</th><th>مبلغ</th><th></th></tr></thead><tbody>${es.length?es.map((e,i)=>`<tr><td>${i+1}</td><td style="font-size:10px">${fd(e.date)}</td><td><span class="badge bg-yellow">${e.category||e.cat}</span></td><td>${e.description||e.desc}</td><td style="font-weight:700;color:var(--r)">${fm(e.amount)}</td><td><button class="btn btn-sm btn-danger" onclick="sv('expenses',D.expenses().filter(x=>x.id!=='${e.id}'));nav('expenses')">🗑️</button></td></tr>`).join(''):'<tr><td colspan="6" style="text-align:center;color:var(--t3);padding:20px">—</td></tr>'}</tbody></table></div></div>`}
function expForm(){openModal(`<div class="modal-header"><h3>➕ مصروف</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="form-row"><div class="form-group"><label>المبلغ</label><input class="input" id="exA" type="number" step=".01"/></div><div class="form-group"><label>تصنيف</label><select class="input" id="exC"><option>إيجار</option><option>رواتب</option><option>كهرباء</option><option>مشتريات</option><option>نقل</option><option>صيانة</option><option>أخرى</option></select></div><div class="form-group span-all"><label>وصف</label><input class="input" id="exD"/></div></div></div><div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="const a=parseFloat(el('exA')?.value)||0;if(!a)return notify('❌','e');const e={id:uid(),amount:a,category:el('exC').value,description:el('exD')?.value||'',date:now()};const es=D.expenses();es.unshift(e);sv('expenses',es);safeTxn('withdraw',a,'مصروف: '+e.category);addLedger('expense',e.description||e.category,0,a);closeModal();nav('expenses');notify('✅ تم')">💾</button></div>`)}

function pgPnL(c){const invs=D.invoices(),purchs=D.purchases(),exps=D.expenses(),rets=D.returns(),s=D.settings();const tS=invs.reduce((s,i)=>s+(i.total||0),0);const tC=invs.reduce((s,i)=>s+(i.costTotal||0),0);const gP=tS-tC;const tE=exps.reduce((s,e)=>s+(e.amount||0),0);const sR=rets.filter(r=>r.returnType==='sale').reduce((s,r)=>s+(r.amount||0),0);const pR=rets.filter(r=>r.returnType==='purchase').reduce((s,r)=>s+(r.amount||0),0);const nP=gP-tE-sR+pR;const rcv=invs.reduce((s,i)=>s+(i.remaining||0),0);const pay=purchs.reduce((s,p)=>s+(p.remaining||0),0);
c.innerHTML=`<div class="topbar"><h2>📈 الأرباح والخسائر</h2><div class="topbar-actions"><button class="btn btn-ghost" onclick="window.print()">🖨️</button></div></div>
<div class="stats-row"><div class="stat" style="border-right-color:var(--g)"><div class="stat-val">${fm(tS)}</div><div class="stat-label">المبيعات</div></div><div class="stat" style="border-right-color:var(--o)"><div class="stat-val">${fm(tC)}</div><div class="stat-label">التكلفة</div></div><div class="stat" style="border-right-color:var(--a)"><div class="stat-val">${fm(gP)}</div><div class="stat-label">مجمل الربح</div></div><div class="stat" style="border-right-color:var(--r)"><div class="stat-val">${fm(tE)}</div><div class="stat-label">المصروفات</div></div><div class="stat" style="border-right-color:${nP>=0?'var(--g)':'var(--r)'}"><div class="stat-val" style="color:${nP>=0?'var(--g)':'var(--r)'}">${fm(nP)}</div><div class="stat-label">صافي ${nP>=0?'الربح':'الخسارة'}</div></div></div>
<div class="card"><div class="card-title" style="margin-bottom:16px">📊 قائمة الأرباح والخسائر</div><table style="max-width:500px"><tr style="background:#f0fdf4"><td style="font-weight:700;padding:10px">📥 المبيعات</td><td style="text-align:left;font-weight:700;color:var(--g);padding:10px">${fm(tS)}</td></tr><tr><td style="padding-right:30px">(-) التكلفة</td><td style="text-align:left;color:var(--r)">(${fm(tC)})</td></tr><tr style="background:#eff6ff"><td style="font-weight:700">= مجمل الربح</td><td style="text-align:left;font-weight:700;color:var(--a)">${fm(gP)}</td></tr><tr><td style="padding-right:30px">(-) المصروفات</td><td style="text-align:left;color:var(--r)">(${fm(tE)})</td></tr><tr><td style="padding-right:30px">(-) مرتجعات بيع</td><td style="text-align:left;color:var(--r)">(${fm(sR)})</td></tr><tr><td style="padding-right:30px">(+) مرتجعات شراء</td><td style="text-align:left;color:var(--g)">${fm(pR)}</td></tr><tr style="background:${nP>=0?'#f0fdf4':'#fef2f2'}"><td style="font-weight:900;font-size:15px;padding:12px">= صافي ${nP>=0?'الربح ✅':'الخسارة ❌'}</td><td style="text-align:left;font-weight:900;font-size:15px;color:${nP>=0?'var(--g)':'var(--r)'}">${fm(nP)}</td></tr></table>
<div style="margin-top:20px"><div class="card-title" style="margin-bottom:10px">💳 الذمم</div><div class="stats-row"><div class="stat" style="border-right-color:var(--o)"><div class="stat-val">${fm(rcv)}</div><div class="stat-label">مستحقات العملاء</div></div><div class="stat" style="border-right-color:var(--r)"><div class="stat-val">${fm(pay)}</div><div class="stat-label">مستحقات الموردين</div></div></div></div></div>`}

function pgLedger(c){const es=D.ledger();c.innerHTML=`<div class="topbar"><h2>📒 دفتر الحسابات</h2></div><div class="card"><div class="table-wrap"><table><thead><tr><th>#</th><th>تاريخ</th><th>نوع</th><th>وصف</th><th>مدين</th><th>دائن</th><th>رصيد</th></tr></thead><tbody>${es.length?es.slice(0,80).map((l,i)=>`<tr><td>${i+1}</td><td style="font-size:10px">${fd(l.date)} ${ft(l.date)}</td><td><span class="badge ${l.debit>0?'bg-green':'bg-red'}">${l.type}</span></td><td style="font-size:11px">${l.desc||l.description}</td><td style="color:var(--g);font-weight:${l.debit?'700':'400'}">${l.debit?fm(l.debit):''}</td><td style="color:var(--r);font-weight:${l.credit?'700':'400'}">${l.credit?fm(l.credit):''}</td><td style="font-family:monospace;font-weight:700">${fm(l.balance)}</td></tr>`).join(''):'<tr><td colspan="7" style="text-align:center;color:var(--t3);padding:20px">—</td></tr>'}</tbody></table></div></div>`}

function pgReports(c){c.innerHTML=`<div class="topbar"><h2>📊 التقارير</h2></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px"><div class="card" style="cursor:pointer" onclick="genRep('top')"><div class="card-title">🏆 الأكثر مبيعاً</div></div><div class="card" style="cursor:pointer" onclick="genRep('stock')"><div class="card-title">💎 قيمة المخزون</div></div><div class="card" style="cursor:pointer" onclick="genRep('custDebt')"><div class="card-title">📝 ديون العملاء</div></div><div class="card" style="cursor:pointer" onclick="genRep('supDebt')"><div class="card-title">🏭 ديون الموردين</div></div></div><div class="card" id="repOut" style="display:none"></div>`}
function genRep(t){const o=el('repOut');o.style.display='block';let h='';if(t==='top'){const s={};D.invoices().forEach(inv=>inv.items?.forEach(it=>{if(!s[it.name])s[it.name]={q:0,r:0,p:0};s[it.name].q+=it.qty;s[it.name].r+=it.price*it.qty;s[it.name].p+=(it.price-(it.cost||it.costPrice||0))*it.qty}));const sorted=Object.entries(s).sort((a,b)=>b[1].q-a[1].q);h=`<div class="card-title">🏆 الأكثر مبيعاً</div><table style="margin-top:10px"><thead><tr><th>#</th><th>المنتج</th><th>كمية</th><th>إيرادات</th><th>ربح</th></tr></thead><tbody>${sorted.map((s,i)=>`<tr><td>${i+1}</td><td><b>${s[0]}</b></td><td>${s[1].q}</td><td>${fm(s[1].r)}</td><td style="color:var(--g);font-weight:700">${fm(s[1].p)}</td></tr>`).join('')}</tbody></table>`}else if(t==='stock'){const ps=D.products();const cv=ps.reduce((s,p)=>s+(p.stock||0)*(p.costPrice||0),0);const rv=ps.reduce((s,p)=>s+(p.stock||0)*(p.retailPrice||0),0);h=`<div class="card-title">💎 قيمة المخزون</div><div class="stats-row" style="margin-top:10px"><div class="stat" style="border-right-color:var(--a)"><div class="stat-val">${ps.reduce((s,p)=>s+(p.stock||0),0)}</div><div class="stat-label">قطع</div></div><div class="stat" style="border-right-color:var(--o)"><div class="stat-val">${fm(cv)}</div><div class="stat-label">تكلفة</div></div><div class="stat" style="border-right-color:var(--g)"><div class="stat-val">${fm(rv)}</div><div class="stat-label">سوقية</div></div><div class="stat" style="border-right-color:var(--pu)"><div class="stat-val">${fm(rv-cv)}</div><div class="stat-label">ربح متوقع</div></div></div>`}else if(t==='custDebt'){const ds=D.customers().filter(c=>(c.balance||0)>0);h=`<div class="card-title">📝 ديون العملاء — ${fm(ds.reduce((s,c)=>s+c.balance,0))}</div><table><thead><tr><th>العميل</th><th>هاتف</th><th>مستحق</th></tr></thead><tbody>${ds.map(c=>`<tr><td><b>${c.name}</b></td><td>${c.phone||'—'}</td><td style="font-weight:700;color:var(--r)">${fm(c.balance)}</td></tr>`).join('')}</tbody></table>`}else{const ds=D.suppliers().filter(s=>(s.balance||0)>0);h=`<div class="card-title">🏭 ديون الموردين — ${fm(ds.reduce((s,sp)=>s+sp.balance,0))}</div><table><thead><tr><th>مورد</th><th>مستحق</th></tr></thead><tbody>${ds.map(s=>`<tr><td><b>${s.name}</b></td><td style="font-weight:700;color:var(--r)">${fm(s.balance)}</td></tr>`).join('')}</tbody></table>`}o.innerHTML=h+`<div style="margin-top:12px"><button class="btn btn-ghost" onclick="window.print()">🖨️</button></div>`}

function pgBackup(c){c.innerHTML=`<div class="topbar"><h2>💾 النسخ الاحتياطي</h2></div><div class="stats-row" style="grid-template-columns:repeat(3,1fr)"><div class="stat" style="border-right-color:var(--g)"><div class="stat-val" style="font-size:14px">${S.g('_lastBk')?fd(S.g('_lastBk'))+' '+ft(S.g('_lastBk')):'—'}</div><div class="stat-label">آخر نسخة</div></div><div class="stat" style="border-right-color:var(--a)"><div class="stat-val" style="font-size:14px">${S.sz()} MB</div><div class="stat-label">حجم البيانات</div></div><div class="stat" style="border-right-color:var(--pu)"><div class="stat-val" style="font-size:14px">${D.settings().deviceId}</div><div class="stat-label">الجهاز</div></div></div><div class="card"><div class="card-title" style="margin-bottom:14px">💾 تصدير واستعادة</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-success" onclick="Sync.exportBackup()">📤 تصدير</button><button class="btn btn-primary" onclick="el('rstF').click()">📥 استعادة</button><input type="file" id="rstF" accept=".json" style="display:none" onchange="handleRst(event)"/><button class="btn btn-danger" onclick="if(confirm('⚠️ حذف كل البيانات؟')&&confirm('متأكد؟')){Object.keys(localStorage).filter(k=>k.startsWith(S.p)).forEach(k=>localStorage.removeItem(k));notify('⚠️ تم');nav('dashboard')}">⚠️ حذف الكل</button></div></div><div class="card"><div class="card-title" style="margin-bottom:14px">📡 المزامنة</div><div style="font-size:12px;color:var(--t2);line-height:1.8">النظام يتزامن تلقائياً بين التبويبات المفتوحة على نفس الجهاز.<br>للمزامنة بين أجهزة: صدّر من الجهاز الرئيسي واستورد على الآخر.</div></div>`}
async function handleRst(e){const f=e.target.files[0];if(!f)return;try{const bk=await Sync.importBackup(f);if(!confirm(`استعادة؟\nمنتجات: ${bk.d?.products?.length||0}\nفواتير: ${bk.d?.invoices?.length||0}`))return;Sync.restore(bk);notify('✅ تم');nav('dashboard')}catch(err){notify('❌ '+err.message,'e')}e.target.value=''}

function pgSettings(c){const s=D.settings();c.innerHTML=`<div class="topbar"><h2>⚙️ الإعدادات</h2></div><div class="card"><div class="card-title" style="margin-bottom:14px">🏪 بيانات المتجر</div><div class="form-row"><div class="form-group"><label>الاسم</label><input class="input" id="stN" value="${s.storeName||''}" onchange="saveSysSettings()"/></div><div class="form-group"><label>الموقع</label><input class="input" id="stL" value="${s.storeLoc||''}" onchange="saveSysSettings()"/></div><div class="form-group"><label>هاتف</label><input class="input" id="stP" value="${s.storePhone||''}" onchange="saveSysSettings()"/></div><div class="form-group"><label>رقم ضريبي</label><input class="input" id="stT" value="${s.storeTRN||''}" onchange="saveSysSettings()"/></div><div class="form-group"><label>ضريبة %</label><input class="input" id="stTx" type="number" value="${s.taxRate||5}" onchange="saveSysSettings()"/></div><div class="form-group"><label>عملة</label><input class="input" id="stC" value="${s.currency||'د.إ'}" onchange="saveSysSettings()"/></div><div class="form-group"><label>بادئة فاتورة</label><input class="input" id="stPx" value="${s.invPfx||'NK-'}" onchange="saveSysSettings()"/></div><div class="form-group"><label>حد مخزون</label><input class="input" id="stLs" type="number" value="${s.lowStock||5}" onchange="saveSysSettings()"/></div></div></div>`}
function saveSysSettings(){const s=D.settings();s.storeName=el('stN')?.value||s.storeName;s.storeLoc=el('stL')?.value||s.storeLoc;s.storePhone=el('stP')?.value||'';s.storeTRN=el('stT')?.value||'';s.taxRate=parseFloat(el('stTx')?.value)||5;s.currency=el('stC')?.value||'د.إ';s.invPfx=el('stPx')?.value||'NK-';s.lowStock=parseInt(el('stLs')?.value)||5;sv('settings',s);notify('✅ تم')}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
el('deviceId').textContent=D.settings().deviceId;
buildSidebar();
nav('dashboard');
Sync.init();
window.addEventListener('beforeunload',()=>Sync.backup());
</script>
</body>
</html>
